<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饺子系列 | CC点心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --brand-beige: #FCFAF7; --brand-dark: #2D2D2D; --brand-gold: #D4B483; }
        body { font-family: 'Noto Sans SC', sans-serif; background-color: var(--brand-beige); color: var(--brand-dark); overflow-x: hidden; }
        .serif { font-family: 'Noto Serif SC', serif; }
        .nav-link { position: relative; transition: color 0.3s; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 1px; bottom: -2px; left: 0; background-color: var(--brand-gold); transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }
        .lang-btn { cursor: pointer; transition: all 0.3s; opacity: 0.4; }
        .lang-btn.active { opacity: 1; color: var(--brand-dark); font-weight: 500; }
    </style>
</head>
<body class="antialiased">
    <nav class="fixed top-0 w-full z-50 px-6 md:px-12 py-3 md:py-4 flex justify-between items-center bg-white/60 backdrop-blur-lg border-b border-white/20">
        <div class="flex items-center space-x-12">
            <a href="index.html" class="text-xl md:text-2xl font-bold tracking-tighter serif">CC点心</a>
            <div class="hidden md:flex space-x-8 text-sm tracking-widest uppercase">
                <a href="about.html" class="nav-link i18n" data-zh="关于我们" data-jp="私たちについて">关于我们</a>
                <a href="menu.html" class="nav-link i18n" data-zh="饺子系列" data-jp="餃子シリーズ">饺子系列</a>
                <a href="info.html" class="nav-link i18n" data-zh="店铺情报" data-jp="店舗情報">店铺情报</a>
            </div>
        </div>
        <div class="flex items-center space-x-4 md:space-x-6 text-sm">
            <div class="flex items-center space-x-2 text-[10px] tracking-widest">
                <span class="lang-btn active" data-lang="zh">CN</span>
                <span class="text-gray-300">/</span>
                <span class="lang-btn" data-lang="jp">JP</span>
            </div>
            <a href="#" class="hidden sm:inline-block border border-dark px-6 py-2 hover:bg-black hover:text-white transition-all duration-300 tracking-widest i18n" data-zh="在线选购" data-jp="オンラインで購入">在线选购</a>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6 md:px-24">
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl serif mb-4 i18n" data-zh="饺子系列" data-jp="餃子シリーズ">饺子系列</h1>
            <p class="text-gray-400 i18n" data-zh="每一只饺子，都是一份心意" data-jp="一つ一つの餃子に、心を込めて">每一只饺子，都是一份心意</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 max-w-6xl mx-auto">
            <div class="product-card text-center">
                <img src="assets/shrimp-jiaozi.png" class="w-full aspect-square object-cover mb-4 rounded-sm shadow-sm">
                <h3 class="text-xl serif mb-2 i18n" data-zh="时令鲜虾水饺" data-jp="季節の海老水餃子">时令鲜虾水饺</h3>
                <p class="text-sm text-gray-400 i18n" data-zh="￥58 / 12只" data-jp="￥1,200 / 12個">￥58 / 12只</p>
            </div>
            <div class="product-card text-center">
                <img src="assets/pork-cabbage-jiaozi.png" class="w-full aspect-square object-cover mb-4 rounded-sm shadow-sm">
                <h3 class="text-xl serif mb-2 i18n" data-zh="特制猪肉白菜饺" data-jp="特製豚肉白菜餃子">特制猪肉白菜饺</h3>
                <p class="text-sm text-gray-400 i18n" data-zh="￥48 / 12只" data-jp="￥1,000 / 12個">￥48 / 12只</p>
            </div>
            <div class="product-card text-center">
                <img src="assets/egg-chive-jiaozi.png" class="w-full aspect-square object-cover mb-4 rounded-sm shadow-sm">
                <h3 class="text-xl serif mb-2 i18n" data-zh="经典鸡蛋韭菜水饺" data-jp="定番ニラ玉水餃子">经典鸡蛋韭菜水饺</h3>
                <p class="text-sm text-gray-400 i18n" data-zh="￥42 / 12只" data-jp="￥900 / 12個">￥42 / 12只</p>
            </div>
        </div>
    </section>

    <footer class="bg-white pt-12 pb-10 px-6 md:px-16 border-t border-gray-50">
        <div class="flex flex-col md:flex-row justify-between items-center text-[9px] md:text-[10px] text-gray-300 tracking-[0.4em] uppercase">
            <p>© 2026 CC DIM SUM. ALL RIGHTS RESERVED.</p>
            <a href="index.html" class="mt-4 md:mt-0 hover:text-black transition-all i18n" data-zh="返回首页" data-jp="ホームに戻る">返回首页</a>
        </div>
    </footer>

    <script>
        const langBtns = document.querySelectorAll('.lang-btn');
        const i18nElements = document.querySelectorAll('.i18n');
        function setLanguage(lang) {
            document.querySelectorAll(`.lang-btn`).forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
            i18nElements.forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) el.innerHTML = text;
            });
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'ja';
            localStorage.setItem('cc-lang', lang);
        }
        langBtns.forEach(btn => btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang'))));
        setLanguage(localStorage.getItem('cc-lang') || 'zh');
    </script>
</body>
</html>
