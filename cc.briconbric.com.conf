server {
    listen 80;
    server_name cc.briconbric.com;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files handled by Nginx for better performance
    location /assets/ {
        alias /var/www/ccdx/public/assets/;
        expires 7d;
    }

    location /uploads/ {
        alias /var/www/ccdx/public/uploads/;
        expires 7d;
    }

    error_log /var/log/nginx/ccdx_error.log;
    access_log /var/log/nginx/ccdx_access.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cc.briconbric.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cc.briconbric.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    if ($scheme != "https") {
        return 301 https://$host$request_uri;
    } # managed by Certbot
}
