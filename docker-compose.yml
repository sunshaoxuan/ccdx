services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - MONGODB_URI=mongodb://db:27017/ccdx
      - JWT_SECRET=ccdx_secret_key_2026
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - ./public/uploads:/usr/src/app/public/uploads

  db:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
